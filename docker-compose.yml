services:
  db:
    image: postgres:16-alpine
    container_name: medyia-db
    environment:
      POSTGRES_USER: medyia
      POSTGRES_PASSWORD: medyia
      POSTGRES_DB: medyia
    ports:
      - "5432:5432"
    volumes:
      - medyia_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

volumes:
  medyia_pgdata:
