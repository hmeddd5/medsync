services:
  postgres:
    image: postgres:16
    container_name: medsync_postgres
    restart: always
    environment:
      POSTGRES_USER: medsync_user
      POSTGRES_PASSWORD: medsync_password
      POSTGRES_DB: medsync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: medsync_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgres://medsync_user:medsync_password@postgres:5432/medsync_db
      JWT_SECRET: medsync_secret_key
      NODE_ENV: development
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: medsync_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: